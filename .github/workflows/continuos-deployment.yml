name: CI and Delivery with Github Actions

on:
  push:
    branches:
      - "main"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Create Env File
        working-directory: ./DOCKER/
        run: |
          echo "MYSQL_URI=${{ vars.MYSQL_URI }}" >> .env
          echo "MYSQL_DATABASE=${{ vars.MYSQL_DATABASE }}" >> .env
          echo "MYSQL_VOLUME_DIR=${{ vars.MYSQL_VOLUME_DIR }}" >> .env
          echo "MYSQL_MAIL_PORT=${{ vars.MYSQL_MAIL_PORT }}" >> .env
          echo "EMAIL_SUBJECT=${{ vars.EMAIL_SUBJECT }}" >> .env
          echo "EMAIL_MESSAGE=${{ vars.EMAIL_MESSAGE }}" >> .env
          echo "IS_TLS_ENABLED=${{ vars.IS_TLS_ENABLED }}" >> .env
          echo "UPLOAD_DIR=${{ vars.UPLOAD_DIR }}" >> .env
          echo "PORT_TEST=${{ vars.PORT_TEST }}" >> .env
          echo "EXPIRE_LENGHT=${{ vars.EXPIRE_LENGHT }}" >> .env
          echo "TZ=${{ vars.TZ }}" >> .env
          echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" >> .env
          echo "MYSQL_USER=${{ secrets.MYSQL_USER }}" >> .env
          echo "MYSQL_USER=${{ secrets.MYSQL_USER }}" >> .env
          echo "MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}" >> .env
          echo "MAIL_HOST=${{ secrets.MAIL_HOST }}" >> .env
          echo "EMAIL_USERNAME=${{ secrets.EMAIL_USERNAME }}" >> .env
          echo "MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}" >> .env
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env


      - name: Build Application .jar
        working-directory: ./DOCKER/rest-with-spring-boot-and-java-erudio/
        run: |
          touch .env
          mvn clean package -DskipTests

      - name: Docker Compose Build
        working-directory: ./DOCKER/
        run: docker compose build

      - name: Push to Docker Hub Container Registry
        run: |
          docker tag ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPOSITORY }}:latest ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPOSITORY }}:${{ github.run_id }}
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPOSITORY }}:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPOSITORY }}:${{ github.run_id }}
